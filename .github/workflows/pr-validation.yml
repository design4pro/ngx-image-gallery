name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check .

      - name: Test library
        run: npx ng test ngx-image-gallery --watch=false

      - name: Build library
        run: npx ng build ngx-image-gallery

      - name: Test demo
        run: npx ng test demo --watch=false

      - name: Build demo
        run: npx ng build demo --configuration development
