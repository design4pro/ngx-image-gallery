name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited
permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: read
  checks: read

jobs:
  pr-validation:
    name: PR Validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check .

      - name: Test library
        run: npx ng test ngx-image-gallery --watch=false

      - name: Build library
        run: npx ng build ngx-image-gallery

      - name: Test demo
        run: npx ng test demo --watch=false

      - name: Build demo
        run: npx ng build demo --configuration development

  automation-gate:
    name: Automation Gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - pr-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run automation gate
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          VALIDATION_RESULT: ${{ needs.pr-validation.result }}
        run: python3 .github/scripts/automation_gate.py
