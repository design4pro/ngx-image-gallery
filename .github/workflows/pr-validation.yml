name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited
  issue_comment:
    types:
      - created
      - edited
      - deleted
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  pull_request_review_comment:
    types:
      - created
      - edited
      - deleted
permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  pr-validation:
    name: PR Validation
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request
    runs-on: ubuntu-latest
    steps:
      - name: Resolve pull request
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "issue_comment" ]; then
            echo "number=${EVENT_PR_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "head_sha=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${EVENT_PR_NUMBER}" --jq .head.sha)" >> "$GITHUB_OUTPUT"
            echo "base_ref=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${EVENT_PR_NUMBER}" --jq .base.ref)" >> "$GITHUB_OUTPUT"
          else
            echo "number=${EVENT_PR_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${EVENT_HEAD_SHA}" >> "$GITHUB_OUTPUT"
            echo "base_ref=${EVENT_BASE_REF}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check .

      - name: Test library
        run: npx ng test ngx-image-gallery --watch=false

      - name: Build library
        run: npx ng build ngx-image-gallery

      - name: Test demo
        run: npx ng test demo --watch=false

      - name: Build demo
        run: npx ng build demo --configuration development

  automation-gate:
    name: Automation Gate
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request
    runs-on: ubuntu-latest
    needs:
      - pr-validation
    steps:
      - name: Resolve pull request
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "issue_comment" ]; then
            echo "number=${EVENT_PR_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "head_sha=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${EVENT_PR_NUMBER}" --jq .head.sha)" >> "$GITHUB_OUTPUT"
            echo "base_ref=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${EVENT_PR_NUMBER}" --jq .base.ref)" >> "$GITHUB_OUTPUT"
          else
            echo "number=${EVENT_PR_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${EVENT_HEAD_SHA}" >> "$GITHUB_OUTPUT"
            echo "base_ref=${EVENT_BASE_REF}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout candidate
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Checkout trusted base
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.base_ref }}
          path: trusted-base

      - name: Run automation gate
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          VALIDATION_RESULT: ${{ needs.pr-validation.result }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          if [ -f trusted-base/.github/scripts/automation_gate.py ]; then
            python3 trusted-base/.github/scripts/automation_gate.py
          else
            echo "Trusted base gate script is missing; using candidate script for the initial bootstrap only."
            python3 .github/scripts/automation_gate.py
          fi
